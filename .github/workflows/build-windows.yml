name: Build Cross-Platform Executables

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.3'
      - name: Install dependencies
        run: pip install pyqt6 pyinstaller
      - name: Build Windows exe
        shell: cmd
        run: pyinstaller --onedir --windowed --collect-all PyQt6 --name SatisfactoryProductionTree --add-data "ui;satisfactory_calculator/ui" --add-data "src/Data;Data" main.py

      - name: Zip the output
        shell: cmd
        run: powershell Compress-Archive -Path dist\SatisfactoryProductionTree -DestinationPath dist\SatisfactoryProductionTree-windows.zip

      - name: Upload exe to release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/SatisfactoryProductionTree-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.3'
      - name: Install dependencies
        run: pip install pyqt6 pyinstaller
      - name: Build Linux binary
        run: pyinstaller --onefile --windowed --name SatisfactoryProductionTree.x86_64 --add-data "ui:ui" --add-data "src/Data:Data" main.py
      - name: Upload Linux binary
        uses: softprops/action-gh-release@v1
        with:
          files: dist/SatisfactoryProductionTree.x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}